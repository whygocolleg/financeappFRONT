<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#16161a">
    <title>Finance App</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<!-- 배경 Orb 레이어 -->
<div class="app-bg" aria-hidden="true">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="bg-grid"></div>
</div>

<!-- ════════════════════════════════════════════
     로그인 / 회원가입 화면
════════════════════════════════════════════ -->
<div class="auth-screen" id="auth-screen">
    <div class="auth-container">
        <div class="auth-logo">💰</div>
        <h1 class="auth-title">Finance App</h1>
        <p class="auth-subtitle">절약 목표를 스마트하게 관리하세요</p>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login">로그인</button>
            <button class="auth-tab"        id="tab-signup">회원가입</button>
        </div>

        <div class="auth-form" id="auth-form">
            <div class="auth-input-group" id="auth-name-group" style="display:none">
                <input class="auth-input" type="text"     id="auth-name"     placeholder="이름" autocomplete="name">
            </div>
            <div class="auth-input-group">
                <input class="auth-input" type="email"    id="auth-email"    placeholder="이메일" autocomplete="email">
            </div>
            <div class="auth-input-group">
                <input class="auth-input" type="password" id="auth-password" placeholder="비밀번호 (6자리 이상)" autocomplete="current-password">
            </div>
            <p class="auth-error" id="auth-error"></p>
            <button class="auth-btn" id="auth-submit">
                <span id="auth-btn-text">로그인</span>
                <span class="auth-spinner" id="auth-spinner" style="display:none"></span>
            </button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════
     앱 Shell
════════════════════════════════════════════ -->
<div class="app-shell" id="app-shell" style="display:none">

    <!-- ── 홈 ── -->
    <div class="screen" id="screen-home">
        <div class="container" id="home-content"></div>
    </div>

    <!-- ── 예상소비 ── -->
    <div class="screen screen--tab" id="screen-transactions">
        <div class="container" id="transactions-content"></div>
    </div>

    <!-- ── 통계 ── -->
    <div class="screen screen--tab" id="screen-stats">
        <div class="container" id="stats-content"></div>
    </div>

    <!-- ── 설정 ── -->
    <div class="screen screen--tab" id="screen-settings">
        <div class="container" id="settings-content"></div>
    </div>

    <!-- ── 목표 상세 ── -->
    <div class="screen" id="screen-detail">
        <div id="detail-header-slot"></div>
        <div class="container" id="detail-content"></div>
    </div>

</div>

<!-- ════════════════════════════════════════════
     하단 네비게이션 바
════════════════════════════════════════════ -->
<nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" id="nav-home" data-tab="home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="nav-label">홈</span>
    </button>
    <button class="nav-item" id="nav-transactions" data-tab="transactions">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2"/>
            <line x1="9" y1="7"  x2="15" y2="7"/>
            <line x1="9" y1="11" x2="15" y2="11"/>
            <line x1="9" y1="15" x2="12" y2="15"/>
        </svg>
        <span class="nav-label">예상소비</span>
    </button>
    <button class="nav-item" id="nav-stats" data-tab="stats">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        <span class="nav-label">통계</span>
    </button>
    <button class="nav-item" id="nav-settings" data-tab="settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="nav-label">설정</span>
    </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="FinancialGoalCard.js"></script>
<script src="mockData.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
